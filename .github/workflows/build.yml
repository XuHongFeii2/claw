name: Build Desktop Apps

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        uses: actions/setup-node@v4z
        with:
          node-version: 20

      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate

      - name: Show pnpm version
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv (all)
        run: pnpm run uv:download

      - name: Set mirrors (optional for non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          echo "ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/" >> $GITHUB_ENV
          echo "ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/" >> $GITHUB_ENV

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm run build:vite
          pnpm exec zx scripts/bundle-openclaw.mjs
          pnpm run bundle:openclaw-plugins
          # Build separate per-arch NSIS installers (2)
          electron-builder --win nsis:x64 --publish=never
          electron-builder --win nsis:arm64 --publish=never

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pnpm run build:vite
          pnpm exec zx scripts/bundle-openclaw.mjs
          pnpm run bundle:openclaw-plugins
          # Build separate per-arch DMG installers (2)
          electron-builder --mac dmg:x64 --publish=never
          electron-builder --mac dmg:arm64 --publish=never

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pnpm run build:vite
          pnpm exec zx scripts/bundle-openclaw.mjs
          pnpm run bundle:openclaw-plugins
          # Build AppImage only, per-arch (2)
          electron-builder --linux AppImage:x64 --publish=never
          electron-builder --linux AppImage:arm64 --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-artifacts
          path: |
            release/**
            release-oneclick/**
          if-no-files-found: ignore
